<!DOCTYPE html>
<html>
<head>
<title>Daily You App</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right,#74ebd5,#ACB6E5);
    text-align: center;
    margin:0;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 90%;
    border-radius: 12px;
}

input {
    padding: 10px;
    width: 70%;
    margin: 5px;
}

button {
    padding: 10px;
    background: green;
    color: white;
    border: none;
    margin: 5px;
    border-radius: 5px;
}

.moods button {
    font-size: 25px;
    border-radius: 50%;
}

/* diary full page */
#diaryPage {
    height: 100vh;
}

#diaryText {
    width: 95%;
    height: 65vh;
    font-size: 18px;
    padding: 15px;
}

/* history */
#history {
    text-align:left;
}
</style>
</head>

<body>

<h1>Daily You</h1>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- WELCOME -->
<div class="container" id="welcomePage" style="display:none;">
<h2>Welcome 🎉</h2>
<p>This is like a game to hold your mood, so let's start!</p>
<button onclick="showPage('moodPage')">Start</button>
</div>

<!-- MOOD -->
<div class="container" id="moodPage" style="display:none;">
<h3>Select Mood</h3>
<div class="moods">
<button onclick="selectMood('Happy')">😊</button>
<button onclick="selectMood('Sad')">😢</button>
<button onclick="selectMood('Angry')">😡</button>
<button onclick="selectMood('Excited')">🤩</button>
<button onclick="selectMood('Tired')">😴</button>
<button onclick="selectMood('Neutral')">😐</button>
</div>
</div>

<!-- DIARY -->
<div class="container" id="diaryPage" style="display:none;">
<h2>Write Your Thoughts 📝</h2>
<textarea id="diaryText" placeholder="Write your feelings here..."></textarea><br>
<button onclick="saveEntry()">Save</button>
</div>

<!-- HISTORY -->
<div class="container" id="historyPage" style="display:none;">
<h3>History</h3>
<div id="history"></div>

<button onclick="downloadData()">Download Data</button>
<button onclick="showPage('analyticsPage')">View</button>
</div>

<!-- ANALYTICS -->
<div class="container" id="analyticsPage" style="display:none;">
<h3>Mood Analytics</h3>
<canvas id="chart"></canvas>

<button onclick="logout()">Logout</button>
<button onclick="showPage('welcomePage')">Go Home</button>
</div>

<script>
let selectedMood = "";

// PAGE SWITCH
function showPage(page) {
    let pages = ["loginPage","welcomePage","moodPage","diaryPage","historyPage","analyticsPage"];
    pages.forEach(p => document.getElementById(p).style.display="none");

    document.getElementById(page).style.display="block";

    if(page==="historyPage") showHistory();

    if(page==="analyticsPage"){
        setTimeout(drawChart, 200); // FIXED
    }
}

// LOGIN
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(!user || pass.length<3){
        alert("Enter valid details");
        return;
    }

    localStorage.setItem("user",user);
    showPage("welcomePage");
}

// LOGOUT
function logout(){
    localStorage.clear();
    showPage("loginPage");
}

// SELECT MOOD
function selectMood(mood){
    selectedMood = mood;
    showPage("diaryPage");
}

// SAVE ENTRY
function saveEntry(){
    let text = document.getElementById("diaryText").value;
    let user = localStorage.getItem("user");
    let date = new Date().toLocaleDateString();

    let entry = {user,mood:selectedMood,text,date};

    let data = JSON.parse(localStorage.getItem("data"))||[];
    data.push(entry);
    localStorage.setItem("data",JSON.stringify(data));

    document.getElementById("diaryText").value="";
    showPage("historyPage");
}

// HISTORY
function showHistory(){
    let data = JSON.parse(localStorage.getItem("data"))||[];
    let div = document.getElementById("history");
    div.innerHTML="";

    data.forEach(e=>{
        div.innerHTML += `<p>${e.user} - ${e.mood}</p><hr>`;
    });
}

// DOWNLOAD
function downloadData(){
    let data = localStorage.getItem("data");
    let blob = new Blob([data],{type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "diary_data.json";
    a.click();
}

// ✅ FIXED CHART FUNCTION
function drawChart(){

    let canvas = document.getElementById("chart");
    let ctx = canvas.getContext("2d");

    canvas.width = 350;
    canvas.height = 250;

    let data = JSON.parse(localStorage.getItem("data")) || [];

    let counts = {
        Happy:0, Sad:0, Angry:0,
        Excited:0, Tired:0, Neutral:0
    };

    data.forEach(e=>{
        if(counts[e.mood] !== undefined){
            counts[e.mood]++;
        }
    });

    let values = Object.values(counts);
    let labels = Object.keys(counts);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let max = Math.max(...values, 1);

    let barWidth = 30;
    let gap = 20;

    values.forEach((val,i)=>{

        let x = i*(barWidth+gap)+20;
        let height = (val / max) * 150;
        let y = 200 - height;

        ctx.fillStyle = "#3498db";
        ctx.fillRect(x, y, barWidth, height);

        ctx.fillStyle = "black";
        ctx.font = "10px Arial";
        ctx.fillText(labels[i], x, 220);
        ctx.fillText(val, x+5, y-5);
    });
}

// START PAGE
window.onload = function(){
    showPage("loginPage");
};
</script>

</body>
</html>
